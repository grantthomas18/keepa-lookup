<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Keepa Price Lookup</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117; --surface: #171b26; --surface2: #1e2433; --border: #2a3045;
    --accent: #ff6b2b; --accent2: #ff9a5c; --text: #e8eaf0; --text-dim: #6b7591;
    --text-mid: #a0a9c0; --green: #2ecc71; --red: #e74c3c; --yellow: #f1c40f;
    --mono: 'IBM Plex Mono', monospace; --sans: 'IBM Plex Sans', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; overflow-x:hidden; }
  body::before {
    content:''; position:fixed; inset:0;
    background-image: linear-gradient(var(--border) 1px,transparent 1px), linear-gradient(90deg,var(--border) 1px,transparent 1px);
    background-size:40px 40px; opacity:0.3; pointer-events:none; z-index:0;
  }
  .app { position:relative; z-index:1; max-width:1600px; margin:0 auto; padding:40px 24px; }

  header { display:flex; align-items:center; justify-content:space-between; margin-bottom:40px; padding-bottom:24px; border-bottom:1px solid var(--border); }
  .logo { display:flex; align-items:center; gap:12px; }
  .logo-icon { width:36px; height:36px; background:var(--accent); border-radius:6px; display:flex; align-items:center; justify-content:center; font-family:var(--mono); font-weight:600; font-size:14px; color:white; letter-spacing:-1px; }
  .logo-text { font-family:var(--mono); font-size:18px; font-weight:600; color:var(--text); letter-spacing:-0.5px; }
  .logo-text span { color:var(--accent); }
  .settings-btn { background:var(--surface); border:1px solid var(--border); color:var(--text-mid); padding:8px 16px; border-radius:6px; font-family:var(--mono); font-size:12px; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:8px; }
  .settings-btn:hover { border-color:var(--accent); color:var(--accent); }

  /* Settings panel */
  .settings-panel { background:var(--surface); border:1px solid var(--border); border-radius:10px; padding:24px; margin-bottom:28px; display:none; animation:slideDown 0.2s ease; }
  .settings-panel.open { display:block; }
  @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }

  .settings-row { display:flex; align-items:center; gap:16px; flex-wrap:wrap; }
  .settings-label { font-family:var(--mono); font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; white-space:nowrap; min-width:100px; }
  .url-input { flex:1; min-width:280px; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:10px 14px; font-family:var(--mono); font-size:13px; color:var(--text); outline:none; transition:border-color 0.2s; }
  .url-input:focus { border-color:var(--accent); }
  .url-input::placeholder { color:var(--text-dim); }
  .save-btn { background:var(--accent); border:none; color:white; padding:10px 20px; border-radius:6px; font-family:var(--mono); font-size:12px; font-weight:600; cursor:pointer; transition:opacity 0.2s; white-space:nowrap; }
  .save-btn:hover { opacity:0.85; }
  .btn-grey { background:var(--surface2); border:1px solid var(--border); color:var(--text-mid); padding:10px 16px; border-radius:6px; font-family:var(--mono); font-size:11px; cursor:pointer; transition:all 0.2s; white-space:nowrap; }
  .btn-grey:hover { border-color:var(--accent); color:var(--accent); }
  .url-status { font-family:var(--mono); font-size:11px; padding:4px 10px; border-radius:4px; white-space:nowrap; }
  .url-status.saved { background:rgba(46,204,113,0.15); color:var(--green); }
  .url-status.unsaved { background:rgba(231,76,60,0.15); color:var(--red); }
  .settings-hint { font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-top:10px; line-height:1.6; }
  .settings-hint code { color:var(--accent2); }

  /* Main layout */
  .main-grid { display:grid; grid-template-columns:300px 1fr; gap:24px; align-items:start; }

  .input-panel { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; position:sticky; top:24px; }
  .panel-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .panel-title { font-family:var(--mono); font-size:11px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); }
  .tab-group { display:flex; gap:4px; }
  .tab { background:transparent; border:1px solid transparent; color:var(--text-dim); padding:4px 12px; border-radius:4px; font-family:var(--mono); font-size:11px; cursor:pointer; transition:all 0.15s; }
  .tab.active { background:var(--surface2); border-color:var(--border); color:var(--text); }
  .tab-content { display:none; padding:20px; }
  .tab-content.active { display:block; }

  .asin-textarea { width:100%; height:180px; background:var(--bg); border:1px solid var(--border); border-radius:6px; padding:12px; font-family:var(--mono); font-size:13px; color:var(--text); resize:vertical; outline:none; transition:border-color 0.2s; line-height:1.8; }
  .asin-textarea:focus { border-color:var(--accent); }
  .asin-textarea::placeholder { color:var(--text-dim); }
  .input-hint { margin-top:8px; font-size:11px; color:var(--text-dim); font-family:var(--mono); }

  .drop-zone { border:2px dashed var(--border); border-radius:8px; padding:36px 20px; text-align:center; cursor:pointer; transition:all 0.2s; position:relative; }
  .drop-zone:hover,.drop-zone.dragging { border-color:var(--accent); background:rgba(255,107,43,0.05); }
  .drop-zone input[type="file"] { position:absolute; inset:0; opacity:0; cursor:pointer; }
  .drop-icon { font-size:28px; margin-bottom:10px; }
  .drop-text { font-family:var(--mono); font-size:11px; color:var(--text-dim); line-height:1.6; }
  .drop-text strong { color:var(--accent); font-weight:600; }
  .file-chosen { margin-top:10px; font-family:var(--mono); font-size:11px; color:var(--green); display:none; }

  .marketplace-row { padding:12px 20px; border-top:1px solid var(--border); display:flex; align-items:center; gap:12px; }
  .market-label { font-family:var(--mono); font-size:11px; color:var(--text-dim); text-transform:uppercase; letter-spacing:1px; }
  .market-btns { display:flex; gap:4px; }
  .market-btn { background:var(--bg); border:1px solid var(--border); color:var(--text-dim); padding:5px 12px; border-radius:4px; font-family:var(--mono); font-size:11px; cursor:pointer; transition:all 0.15s; }
  .market-btn.active { border-color:var(--accent); color:var(--accent); background:rgba(255,107,43,0.1); }

  .action-area { padding:16px 20px; border-top:1px solid var(--border); display:flex; align-items:center; gap:12px; }
  .run-btn { flex:1; background:var(--accent); border:none; color:white; padding:12px; border-radius:6px; font-family:var(--mono); font-size:13px; font-weight:600; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; justify-content:center; gap:8px; }
  .run-btn:hover:not(:disabled) { background:var(--accent2); transform:translateY(-1px); }
  .run-btn:disabled { opacity:0.4; cursor:not-allowed; transform:none; }
  .asin-count { font-family:var(--mono); font-size:11px; color:var(--text-dim); white-space:nowrap; }

  /* Results */
  .results-panel { background:var(--surface); border:1px solid var(--border); border-radius:10px; overflow:hidden; min-height:400px; }
  .results-header { padding:16px 20px; border-bottom:1px solid var(--border); display:flex; align-items:center; justify-content:space-between; }
  .results-meta { display:flex; align-items:center; gap:12px; }
  .result-badge { font-family:var(--mono); font-size:11px; padding:3px 10px; border-radius:20px; background:rgba(255,107,43,0.15); color:var(--accent); border:1px solid rgba(255,107,43,0.3); }
  .export-btn { background:var(--surface2); border:1px solid var(--border); color:var(--text-mid); padding:7px 14px; border-radius:6px; font-family:var(--mono); font-size:11px; cursor:pointer; transition:all 0.2s; }
  .export-btn:hover:not(:disabled) { border-color:var(--accent); color:var(--accent); }
  .export-btn:disabled { opacity:0.3; cursor:not-allowed; }

  /* Table */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; }
  thead th { padding:10px 14px; text-align:left; font-family:var(--mono); font-size:10px; text-transform:uppercase; letter-spacing:1.5px; color:var(--text-dim); background:var(--surface2); border-bottom:1px solid var(--border); white-space:nowrap; }
  tbody tr { border-bottom:1px solid rgba(42,48,69,0.5); transition:background 0.1s; }
  tbody tr:hover { background:rgba(255,255,255,0.02); }
  tbody tr:last-child { border-bottom:none; }
  td { padding:12px 14px; font-family:var(--mono); font-size:12px; vertical-align:middle; }

  .td-asin { color:var(--text-mid); font-size:11px; white-space:nowrap; }
  /* Title: clamped to 2 lines by default with ellipsis, full text on hover via title="" */
  .td-title { color:var(--text); font-size:12px; line-height:1.45; }
  .td-title span {
    display:-webkit-box;
    -webkit-line-clamp:2;
    -webkit-box-orient:vertical;
    overflow:hidden;
    text-overflow:ellipsis;
    word-break:break-word;
  }
  /* Full wrap mode — toggled on the table wrapper */
  .wrap-titles .td-title span {
    display:block;
    -webkit-line-clamp:unset;
    overflow:visible;
    white-space:normal;
  }
  /* Column sizing — colgroup sets base widths; Title absorbs the remainder */
  table { table-layout:fixed; }
  col.col-title { width:auto; }
  .price-cell { font-weight:600; font-size:13px; color:var(--green); white-space:nowrap; }
  .price-none { color:var(--text-dim); font-size:11px; }
  .rank-cell { color:var(--text-mid); font-size:12px; white-space:nowrap; }
  .star-filled { color:#f1c40f; }
  .star-empty { color:var(--border); }
  .stars-wrap { white-space:nowrap; }
  .reviews-cell { color:var(--text-mid); font-size:12px; white-space:nowrap; }
  .sold-cell { color:var(--text); font-size:12px; font-weight:600; white-space:nowrap; }
  .sold-trend { font-size:10px; margin-left:6px; font-weight:500; }
  .sold-trend.up { color:var(--green); }
  .sold-trend.down { color:var(--red); }
  .status-cell { display:flex; align-items:center; gap:6px; }
  .dot { width:6px; height:6px; border-radius:50%; flex-shrink:0; }
  .dot-ok { background:var(--green); }
  .dot-error { background:var(--red); }
  .dot-loading { background:var(--yellow); animation:pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .empty-state { display:flex; flex-direction:column; align-items:center; justify-content:center; padding:80px 40px; text-align:center; gap:12px; }
  .empty-icon { font-size:40px; opacity:0.3; }
  .empty-text { font-family:var(--mono); font-size:12px; color:var(--text-dim); line-height:1.7; }

  .progress-bar-wrap { padding:12px 20px; border-top:1px solid var(--border); display:none; }
  .progress-bar-wrap.visible { display:block; }
  .progress-info { display:flex; justify-content:space-between; font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-bottom:6px; }
  .progress-bar { height:3px; background:var(--surface2); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; background:var(--accent); border-radius:2px; transition:width 0.3s ease; }

  .toast { position:fixed; bottom:24px; right:24px; background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:12px 18px; font-family:var(--mono); font-size:12px; z-index:100; opacity:0; transform:translateY(8px); transition:all 0.3s; max-width:320px; }
  .toast.show { opacity:1; transform:translateY(0); }
  .toast.success { border-color:var(--green); color:var(--green); }
  .toast.error { border-color:var(--red); color:var(--red); }
  .spinner { width:14px; height:14px; border:2px solid rgba(255,255,255,0.3); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; display:none; }
  @keyframes spin { to{transform:rotate(360deg)} }

  /* No-proxy warning banner */
  .warning-banner { background:rgba(231,76,60,0.1); border:1px solid rgba(231,76,60,0.3); border-radius:8px; padding:12px 16px; margin-bottom:24px; font-family:var(--mono); font-size:12px; color:var(--red); display:none; }
  .warning-banner.show { display:flex; align-items:center; gap:10px; }
  .warning-banner button { margin-left:auto; background:var(--red); border:none; color:white; padding:5px 12px; border-radius:4px; font-family:var(--mono); font-size:11px; cursor:pointer; white-space:nowrap; }
</style>
</head>
<body>
<div class="app">

  <header>
    <div class="logo">
      <div class="logo-icon">K↗</div>
      <div class="logo-text">Keepa <span>Price Lookup</span></div>
    </div>

  </header>





  <div class="main-grid">
    <div class="input-panel">
      <div class="panel-header">
        <span class="panel-title">Input ASINs</span>
        <div class="tab-group">
          <button class="tab active" onclick="switchTab('paste',this)">Paste</button>
          <button class="tab" onclick="switchTab('upload',this)">Upload CSV</button>
        </div>
      </div>

      <div class="tab-content active" id="tab-paste">
        <textarea class="asin-textarea" id="asinTextarea"
          placeholder="B08BG7N16C&#10;B09QQRKDHN&#10;B01N5IB20Q&#10;..."
          oninput="updateCount()"></textarea>
        <div class="input-hint">One ASIN per line</div>
      </div>

      <div class="tab-content" id="tab-upload">
        <div class="drop-zone" id="dropZone">
          <input type="file" accept=".csv,.txt" id="fileInput" onchange="handleFile(this)" />
          <div class="drop-icon">📄</div>
          <div class="drop-text"><strong>Click to browse</strong> or drag &amp; drop<br>CSV or TXT — one ASIN per row</div>
          <div class="file-chosen" id="fileChosen"></div>
        </div>
      </div>

      <div class="marketplace-row">
        <span class="market-label">Market</span>
        <div class="market-btns">
          <button class="market-btn active" data-domain="1" onclick="setMarket(this)">🇺🇸 US</button>
          <button class="market-btn" data-domain="2" onclick="setMarket(this)">🇬🇧 UK</button>
          <button class="market-btn" data-domain="3" onclick="setMarket(this)">🇩🇪 DE</button>
        </div>
      </div>

      <div class="action-area">
        <button class="run-btn" id="runBtn" onclick="runLookup()">
          <div class="spinner" id="spinner"></div>
          <span id="runBtnText">▶ Run Lookup</span>
        </button>
        <span class="asin-count" id="asinCount">0 ASINs</span>
      </div>
    </div>

    <div class="results-panel">
      <div class="results-header">
        <div class="results-meta">
          <span class="panel-title">Results</span>
          <span class="result-badge" id="resultBadge" style="display:none"></span>
        </div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="export-btn" id="wrapToggleBtn" onclick="toggleWrapTitles()" title="Toggle between clamped and full-wrap titles">↕ Wrap titles</button>
          <button class="export-btn" id="exportBtn" onclick="exportCSV()" disabled>↓ Export CSV</button>
        </div>
      </div>
      <div id="tableContainer">
        <div class="empty-state">
          <div class="empty-icon">📦</div>
          <div class="empty-text">Enter ASINs and hit Run Lookup<br>to fetch prices, rank and reviews from Keepa.</div>
        </div>
      </div>
      <div class="progress-bar-wrap" id="progressWrap">
        <div class="progress-info">
          <span id="progressText">Fetching…</span>
          <span id="progressPct">0%</span>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  // ── Hardcoded proxy URL ───────────────────────────────────
  const PROXY_URL = 'https://keepa-lookup-production.up.railway.app';

  let results = [], uploadedAsins = [], activeTab = 'paste', selectedDomain = 1, wrapTitles = false;

  async function testProxy() {
    const url = (document.getElementById('proxyUrlInput').value.trim()).replace(/\/$/, '');
    if (!url) { showToast('Enter a URL first', 'error'); return; }
    showToast('Testing proxy…', 'success');
    try {
      const r = await fetch(url + '/health');
      const j = await r.json();
      showToast(r.ok && j.ok ? '✓ Proxy is running!' : '✗ Health check failed', r.ok && j.ok ? 'success' : 'error');
    } catch(e) { showToast('✗ Cannot reach proxy: ' + e.message, 'error'); }
  }

  function getProxyUrl() {
    return PROXY_URL;
  }

  // ── Marketplace ───────────────────────────────────────────
  function setMarket(btn) {
    document.querySelectorAll('.market-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedDomain = parseInt(btn.dataset.domain);
  }

  // ── Tabs ─────────────────────────────────────────────────
  function switchTab(tab, btn) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + tab).classList.add('active');
    updateCount();
  }

  // ── ASINs ────────────────────────────────────────────────
  function getAsins() {
    if (activeTab === 'paste') {
      return document.getElementById('asinTextarea').value
        .split('\n').map(l => l.trim().toUpperCase()).filter(l => /^[A-Z0-9]{10}$/.test(l));
    }
    return uploadedAsins;
  }

  function updateCount() {
    const n = getAsins().length;
    document.getElementById('asinCount').textContent = n + ' ASIN' + (n !== 1 ? 's' : '');
  }

  // ── File upload ──────────────────────────────────────────
  function handleFile(input) {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      const asins = [];
      for (const line of e.target.result.split('\n'))
        for (const cell of line.split(',')) {
          const v = cell.trim().replace(/"/g,'').toUpperCase();
          if (/^[A-Z0-9]{10}$/.test(v) && !asins.includes(v)) asins.push(v);
        }
      uploadedAsins = asins;
      const el = document.getElementById('fileChosen');
      el.style.display = 'block';
      el.textContent = '✓ ' + file.name + ' — ' + asins.length + ' ASINs found';
      updateCount();
    };
    reader.readAsText(file);
  }

  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragging'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragging'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('dragging');
    const f = e.dataTransfer.files[0];
    if (f) { document.getElementById('fileInput').files = e.dataTransfer.files; handleFile(document.getElementById('fileInput')); }
  });

  // ── API ──────────────────────────────────────────────────
  async function fetchKeepaData(asins, domain) {
    const proxyUrl = getProxyUrl();
    if (!proxyUrl) throw new Error('No proxy URL configured. Click ⚙ Settings to set one.');

    const BATCH = 100;
    const all = [];
    for (let i = 0; i < asins.length; i += BATCH) {
      const batch = asins.slice(i, i + BATCH);
      const url = proxyUrl + '/lookup?asin=' + batch.join(',') + '&domain=' + domain;
      let resp;
      try { resp = await fetch(url); }
      catch(e) { throw new Error('Cannot reach proxy server: ' + e.message); }
      const text = await resp.text();
      if (!resp.ok) {
        let detail = text.slice(0,200);
        try { const j = JSON.parse(text); detail = j.error || detail; } catch(e) {}
        throw new Error('Proxy error ' + resp.status + ': ' + detail);
      }
      let data;
      try { data = JSON.parse(text); }
      catch(e) { throw new Error('Invalid response from proxy. Check Railway logs.'); }
      if (data.products) all.push(...data.products);
    }
    return all;
  }

  // ── Parse ────────────────────────────────────────────────
  function parseProduct(product) {
    const stats = product.stats || {};
    const c = stats.current || [];

    let buyBox = null;
    if (stats.buyBoxPrice > 0) buyBox = stats.buyBoxPrice / 100;
    else if (c[18] > 0) buyBox = c[18] / 100;

    // List Price — current[4] is the listing/MSRP price.
    let listPrice = null;
    if (c[4] > 0) listPrice = c[4] / 100;

    let salesRank = c[3] > 0 ? c[3] : null;

    // Star rating: current[16]/10. Fallback: walk csv[16] for last non-(-1) value
    let starRating = c[16] > 0 ? c[16] / 10 : null;
    if (!starRating) {
      const s = (product.csv || [])[16];
      if (Array.isArray(s)) {
        for (let i = s.length - 1; i >= 1; i -= 2) {
          if (s[i] > 0) { starRating = s[i] / 10; break; }
        }
      }
    }

    // Review count: current[17]. Fallback: walk csv[17] for last non-(-1) value
    let reviewCount = c[17] > 0 ? c[17] : null;
    if (!reviewCount) {
      const s = (product.csv || [])[17];
      if (Array.isArray(s)) {
        for (let i = s.length - 1; i >= 1; i -= 2) {
          if (s[i] > 0) { reviewCount = s[i]; break; }
        }
      }
    }

    // Monthly Sold — "XX bought in past month" from Amazon.
    // Most ASINs do NOT have this set; returns null if unavailable.
    // monthlySold is directly on the product object, not in stats.
    let monthlySold = null;
    if (typeof product.monthlySold === 'number' && product.monthlySold > 0) {
      monthlySold = product.monthlySold;
    }

    // Trend vs 90-day average (integer percent, +/-). Requires stats=30+.
    let monthlySoldDelta = null;
    if (typeof stats.deltaPercent90_monthlySold === 'number' && stats.deltaPercent90_monthlySold !== 0) {
      monthlySoldDelta = stats.deltaPercent90_monthlySold;
    }

    const brand = product.brand || null;
    return { buyBox, listPrice, salesRank, starRating, reviewCount, brand, monthlySold, monthlySoldDelta };
  }

  // ── Lookup ───────────────────────────────────────────────
  async function runLookup() {

    const asins = getAsins();
    if (!asins.length) { showToast('No valid ASINs found', 'error'); return; }

    setLoading(true);
    results = asins.map(a => ({ asin:a, status:'loading', title:'', brand:null, buyBox:null, listPrice:null, salesRank:null, starRating:null, reviewCount:null, monthlySold:null, monthlySoldDelta:null, error:null }));
    renderTable(results);
    showProgress(true, 0, asins.length);

    try {
      const products = await fetchKeepaData(asins, selectedDomain);
      const map = {};
      for (const p of products) map[p.asin] = p;

      results = asins.map(asin => {
        const p = map[asin];
        if (!p) return { asin, status:'error', title:'', brand:null, buyBox:null, listPrice:null, salesRank:null, starRating:null, reviewCount:null, monthlySold:null, monthlySoldDelta:null, error:'Not found' };
        return { asin, status:'ok', title: p.title || '', ...parseProduct(p), error:null };
      });

      renderTable(results);
      showProgress(true, asins.length, asins.length);
      document.getElementById('exportBtn').disabled = false;
      const badge = document.getElementById('resultBadge');
      badge.style.display = '';
      badge.textContent = results.filter(r => r.status === 'ok').length + ' / ' + results.length;
      showToast('Done! ' + results.length + ' ASINs processed.', 'success');

    } catch(err) {
      showToast('Error: ' + err.message, 'error');
      results = results.map(r => ({ ...r, status:'error', error:err.message }));
      renderTable(results);
    } finally {
      setLoading(false);
      setTimeout(() => showProgress(false), 2000);
    }
  }

  // ── Render ───────────────────────────────────────────────
  const AMAZON_TLD = { 1:'com', 2:'co.uk', 3:'de' };
  const CURRENCY_SYMBOL = { 1:'$', 2:'£', 3:'€' };

  function amazonUrl(asin) {
    return 'https://www.amazon.' + (AMAZON_TLD[selectedDomain] || 'com') + '/dp/' + asin;
  }

  function stars(rating) {
    if (!rating) return '<span class="price-none">—</span>';
    let h = '<span class="stars-wrap">';
    for (let i = 1; i <= 5; i++) {
      if (rating >= i - 0.25) h += '<span class="star-filled">★</span>';
      else if (rating >= i - 0.75) h += '<span class="star-filled" style="opacity:0.5">★</span>';
      else h += '<span class="star-empty">★</span>';
    }
    return h + ' <span style="color:var(--text-mid);font-size:10px">' + rating.toFixed(1) + '</span></span>';
  }

  // Format monthlySold to match Amazon's display style ("50+", "1K+", "10K+")
  function formatMonthlySold(n) {
    if (n == null) return null;
    if (n < 1000)  return n + '+';
    if (n < 10000) return Math.floor(n / 1000) + 'K+';
    return Math.floor(n / 1000) + 'K+';
  }

  function renderMonthlySold(n, delta) {
    const formatted = formatMonthlySold(n);
    if (!formatted) return '<span class="price-none">—</span>';
    let html = '<span class="sold-cell">' + formatted + '</span>';
    if (delta != null) {
      const arrow = delta > 0 ? '↑' : '↓';
      const cls = delta > 0 ? 'up' : 'down';
      html += '<span class="sold-trend ' + cls + '">' + arrow + Math.abs(delta) + '%</span>';
    }
    return html;
  }

  function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function renderTable(rows) {
    const c = document.getElementById('tableContainer');
    if (!rows.length) { c.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">No results.</div></div>'; return; }
    const ph = '<span class="price-none">…</span>';
    const wrapClass = wrapTitles ? ' wrap-titles' : '';
    c.innerHTML = '<div class="table-wrap' + wrapClass + '"><table>' +
      '<colgroup>' +
        '<col style="width:110px">' +   // ASIN
        '<col style="width:140px">' +   // Brand
        '<col class="col-title">' +      // Title (flex)
        '<col style="width:90px">' +    // Buy Box
        '<col style="width:90px">' +    // List Price
        '<col style="width:100px">' +   // Sales Rank
        '<col style="width:100px">' +   // Rating
        '<col style="width:80px">' +    // Reviews
        '<col style="width:120px">' +   // Sold / Mo
        '<col style="width:110px">' +   // Status
      '</colgroup>' +
      '<thead><tr>' +
      '<th>ASIN</th><th>Brand</th><th>Title</th><th>Buy Box</th><th>List Price</th><th>Sales Rank</th><th>Rating</th><th>Reviews</th><th>Sold / Mo</th><th>Status</th>' +
      '</tr></thead><tbody>' +
      rows.map(r => {
        const l = r.status === 'loading';
        return '<tr>' +
          '<td class="td-asin"><a href="' + amazonUrl(r.asin) + '" target="_blank" rel="noopener" style="color:var(--text-mid);text-decoration:none;border-bottom:1px solid var(--border);transition:color 0.15s" onmouseover="this.style.color=\'var(--accent)\'" onmouseout="this.style.color=\'var(--text-mid)\'">' + r.asin + '</a></td>' +
          '<td style="color:var(--text-mid);font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="' + esc(r.brand||'') + '">' + (l ? ph : r.brand ? esc(r.brand) : '<span class="price-none">—</span>') + '</td>' +
          '<td class="td-title"><span title="' + esc(r.title) + '">' + (r.title ? esc(r.title) : '<span class="price-none">—</span>') + '</span></td>' +
          '<td>' + (l ? ph : r.buyBox !== null ? '<span class="price-cell" style="color:' + (r.listPrice !== null && r.buyBox > r.listPrice ? 'var(--red)' : 'var(--green)') + '">' + (CURRENCY_SYMBOL[selectedDomain]||'$') + r.buyBox.toFixed(2) + '</span>' : '<span class="price-none">N/A</span>') + '</td>' +
          '<td>' + (l ? ph : r.listPrice !== null ? '<span class="price-cell">' + (CURRENCY_SYMBOL[selectedDomain]||'$') + r.listPrice.toFixed(2) + '</span>' : '<span class="price-none">N/A</span>') + '</td>' +
          '<td>' + (l ? ph : r.salesRank !== null ? '<span class="rank-cell">#' + r.salesRank.toLocaleString() + '</span>' : '<span class="price-none">N/A</span>') + '</td>' +
          '<td>' + (l ? ph : stars(r.starRating)) + '</td>' +
          '<td>' + (l ? ph : r.reviewCount !== null ? '<span class="reviews-cell">' + r.reviewCount.toLocaleString() + '</span>' : '<span class="price-none">N/A</span>') + '</td>' +
          '<td>' + (l ? ph : renderMonthlySold(r.monthlySold, r.monthlySoldDelta)) + '</td>' +
          '<td><div class="status-cell"><div class="dot dot-' + (r.status==='ok'?'ok':r.status==='error'?'error':'loading') + '"></div>' +
          '<span style="color:var(--text-dim);font-size:11px;word-break:break-word;max-width:120px">' + (r.status==='ok'?'OK':r.status==='error'?(r.error||'Error'):'Loading…') + '</span></div></td>' +
          '</tr>';
      }).join('') + '</tbody></table></div>';
  }

  // ── Export ───────────────────────────────────────────────
  function exportCSV() {
    if (!results.length) return;
    const mkt = {1:'US',2:'UK',3:'DE'}[selectedDomain]||'US';
    const hdr = 'ASIN,Brand,Title,Marketplace,Buy Box,List Price,Sales Rank,Star Rating,Review Count,Monthly Sold,Monthly Sold Delta %,Status';
    const rows = results.map(r =>
      '"'+r.asin+'","'+(r.brand||'').replace(/"/g,'""')+'","'+(r.title||'').replace(/"/g,'""')+'","'+mkt+'",' +
      '"'+(r.buyBox!==null?r.buyBox.toFixed(2):'')+'",' +
      '"'+(r.listPrice!==null?r.listPrice.toFixed(2):'')+'",' +
      '"'+(r.salesRank!==null?r.salesRank:'')+'",' +
      '"'+(r.starRating!==null?r.starRating.toFixed(1):'')+'",' +
      '"'+(r.reviewCount!==null?r.reviewCount:'')+'",' +
      '"'+(r.monthlySold!==null?r.monthlySold:'')+'",' +
      '"'+(r.monthlySoldDelta!==null?r.monthlySoldDelta:'')+'",' +
      '"'+r.status+'"'
    );
    const blob = new Blob([[hdr,...rows].join('\n')], {type:'text/csv'});
    const a = Object.assign(document.createElement('a'), {href:URL.createObjectURL(blob), download:'keepa-'+mkt+'-'+new Date().toISOString().slice(0,10)+'.csv'});
    a.click(); URL.revokeObjectURL(a.href);
    showToast('CSV exported!', 'success');
  }

  // ── UI helpers ───────────────────────────────────────────
  function toggleWrapTitles() {
    wrapTitles = !wrapTitles;
    const wrap = document.querySelector('.table-wrap');
    if (wrap) wrap.classList.toggle('wrap-titles', wrapTitles);
    const btn = document.getElementById('wrapToggleBtn');
    if (btn) btn.style.color = wrapTitles ? 'var(--accent)' : '';
  }

  function setLoading(on) {
    document.getElementById('runBtn').disabled = on;
    document.getElementById('spinner').style.display = on ? 'block' : 'none';
    document.getElementById('runBtnText').textContent = on ? 'Fetching…' : '▶ Run Lookup';
  }

  function showProgress(visible, done, total) {
    document.getElementById('progressWrap').classList.toggle('visible', visible);
    if (visible && total) {
      const pct = Math.round(done/total*100);
      document.getElementById('progressText').textContent = done===total ? 'Complete!' : 'Fetching '+done+' / '+total+'…';
      document.getElementById('progressPct').textContent = pct + '%';
      document.getElementById('progressFill').style.width = pct + '%';
    }
  }

  let toastTimer;
  function showToast(msg, type) {
    const el = document.getElementById('toast');
    el.textContent = msg; el.className = 'toast '+(type||'success')+' show';
    clearTimeout(toastTimer); toastTimer = setTimeout(() => el.classList.remove('show'), 3500);
  }

  // ── Init ─────────────────────────────────────────────────
  document.getElementById('asinTextarea').addEventListener('input', updateCount);
</script>
</body>
</html>
